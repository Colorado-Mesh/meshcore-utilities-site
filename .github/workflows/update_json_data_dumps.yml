name: Update JSON Data Dumps from Colorado Python library
on:
  # Trigger on every push to main/master, if the commit message doesn't contain "[no build]"
  push:
    branches:
      - main
      - master

jobs:
  dump:
    name: Dump enums and other data to JSON
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: contains(github.event.head_commit.message, '[no build]') == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data/requirements.txt
          pip install -e .

      - name: Run Python script to dump data to JSON
        run: python static/data/dump_colorado_py_data.py

      - name: Commit data files if modified
        uses: EndBug/add-and-commit@v10
        with:
          add: 'static/data/*.json'
          default_author: github_actions
          message: "JSON data updated [skip actions] [no build]" # https://github.blog/changelog/2021-02-08-github-actions-skip-pull-request-and-push-workflows-with-skip-ci/
          push: '--force'
